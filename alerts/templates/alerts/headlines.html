{% extends 'alerts/base.html' %}
{% load static %}

{% block content %}
<div style="max-width:900px; margin:0 auto;">
  <div class="panel" style="margin-bottom:1.5rem;">
    <h2 style="font-size:1.4rem; font-weight:800; color:var(--brand-light); margin-bottom:0.5rem;">📰 Market Headlines</h2>
    <p style="color:var(--text-secondary); font-size:0.85rem;">Real-time financial news from major outlets</p>
  </div>

  <div class="panel" style="padding:0; overflow:hidden; min-height:600px;">
    <div class="tradingview-widget-container" style="height:100%; width:100%;">
      <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
      {
      "feedMode": "all_symbols",
      "isTransparent": true,
      "displayMode": "regular",
      "width": "100%",
      "height": "100%",
      "colorTheme": "dark",
      "locale": "en"
      }
      </script>
    </div>
  </div>
</div>
{% endblock %}
