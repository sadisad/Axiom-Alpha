{% extends 'alerts/base.html' %}

{% block content %}
<style>
.hm-page{display:flex;flex-direction:column;gap:1rem;}
.hm-panel{background:rgba(15,10,60,0.7);border:1px solid rgba(138,203,208,0.15);border-radius:14px;padding:1rem 1.25rem;}

/* Top bar */
.hm-topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.hm-title-row{display:flex;align-items:center;gap:0.75rem;}
.hm-title-row h1{font-size:1.4rem;font-weight:800;color:var(--brand-light);margin:0;}

/* Universe dropdown */
.hm-universe-btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.35rem 0.85rem;border-radius:8px;border:1px solid rgba(138,203,208,0.25);background:rgba(23,12,121,0.6);color:var(--brand-light);font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;}
.hm-universe-btn:hover{border-color:var(--brand-teal);background:rgba(86,182,198,0.08);}
.hm-universe-dd{display:none;position:absolute;top:100%;left:0;margin-top:6px;width:260px;max-height:420px;overflow-y:auto;background:rgba(15,10,60,0.98);border:1px solid rgba(138,203,208,0.2);border-radius:10px;padding:0.5rem 0;z-index:200;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.hm-universe-dd.open{display:block;}
.hm-sec{padding:0.3rem 0.75rem;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-top:0.4rem;}
.hm-opt{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.75rem;font-size:0.82rem;color:var(--text-secondary);cursor:pointer;transition:all 0.12s;border:none;background:none;width:100%;text-align:left;font-family:'Outfit',sans-serif;}
.hm-opt:hover{background:rgba(86,182,198,0.1);color:var(--brand-light);}
.hm-opt.active{color:var(--brand-teal);background:rgba(86,182,198,0.08);}
.hm-opt .cnt{margin-left:auto;font-size:0.7rem;color:#555;}

/* Metric tabs row */
.hm-metric-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.hm-metric-row .hm-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-right:0.25rem;white-space:nowrap;}
.hm-pill{padding:0.3rem 0.7rem;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid rgba(138,203,208,0.2);color:var(--text-secondary);background:transparent;transition:all 0.15s;font-family:'Outfit',sans-serif;}
.hm-pill:hover{border-color:var(--brand-teal);color:var(--brand-teal);}
.hm-pill.active{background:var(--brand-teal);color:#0d0645;border-color:var(--brand-teal);}
.hm-tab{padding:0.35rem 0.85rem;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;border:1px solid rgba(138,203,208,0.12);color:var(--text-secondary);background:transparent;transition:all 0.15s;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:0.3rem;}
.hm-tab:hover{border-color:var(--brand-teal);color:var(--brand-teal);}
.hm-tab.active{background:rgba(0,200,150,0.12);color:#00c896;border-color:rgba(0,200,150,0.3);}

/* View toggle */
.hm-view-toggle{display:flex;gap:0.3rem;margin-left:auto;}

/* Legend */
.hm-legend{display:flex;align-items:center;gap:1.5rem;padding:0.5rem 0 0.25rem;font-size:0.72rem;color:var(--text-secondary);}
.hm-legend-bar{width:140px;height:10px;border-radius:5px;}

/* Heatmap container */
.hm-map-wrap{position:relative;}

@media(max-width:900px){
  .hm-topbar{flex-direction:column;align-items:stretch;}
  .hm-metric-row{flex-wrap:wrap;}
  .hm-view-toggle{margin-left:0;}
}
@media(max-width:600px){
  .hm-panel{padding:0.6rem;}
  .hm-title-row h1{font-size:1.1rem;}
  .hm-opt{font-size:0.78rem;padding:0.35rem 0.6rem;}
  .hm-pill{font-size:0.72rem;padding:0.2rem 0.5rem;}
  .hm-universe-dd{width:calc(100vw - 2rem);max-height:350px;left:-0.5rem;}
  .hm-view-toggle{flex-wrap:wrap;}
}
</style>

<div class="hm-page">

  <!-- Top Bar: Title + Universe Selector -->
  <div class="hm-panel">
    <div class="hm-topbar">
      <div class="hm-title-row">
        <h1>Heatmap</h1>
        <div style="position:relative;" id="universe-dd-wrap">
          <button class="hm-universe-btn" onclick="toggleUniverseDD()" id="universe-btn">
            <span id="universe-label">🇺🇸 S&P 500</span>
            <i data-lucide="chevron-down" style="width:14px;height:14px;"></i>
          </button>
          <div class="hm-universe-dd" id="universe-dd">
            <div class="hm-sec">Trending</div>
            <button class="hm-opt active" onclick="pickUniverse('SPX500','🇺🇸 S&P 500',this)">💾 Semiconductors</button>
            <button class="hm-opt" onclick="pickUniverse('SPX500','🇺🇸 S&P 500',this)">⭐ Magnificent 7</button>
            <div class="hm-sec">Lists</div>
            <button class="hm-opt" onclick="pickUniverse('SPX500','🇺🇸 S&P 500',this)">🇺🇸 S&P 500 <span class="cnt">500</span></button>
            <button class="hm-opt" onclick="pickUniverse('NASDAQ100','💻 NASDAQ 100',this)">💻 NASDAQ 100 <span class="cnt">99</span></button>
            <button class="hm-opt" onclick="pickUniverse('DowJones','📈 Dow Jones',this)">📈 Dow Jones 30</button>
            <button class="hm-opt" onclick="pickUniverse('Russell2000','📊 Russell 2000',this)">📊 Russell 2000</button>
            <button class="hm-opt" onclick="pickUniverse('Russell1000','📊 Russell 1000',this)">📊 Russell 1000</button>
            <button class="hm-opt" onclick="pickUniverse('AllUSA','🇺🇸 All US Stocks',this)">🇺🇸 All US Stocks</button>
            <div class="hm-sec">Countries</div>
            <button class="hm-opt" onclick="pickUniverse('AllUSA','🇺🇸 United States',this)">🇺🇸 United States</button>
            <button class="hm-opt" onclick="pickUniverse('AllChina','🇨🇳 China',this)">🇨🇳 China</button>
            <button class="hm-opt" onclick="pickUniverse('AllJapan','🇯🇵 Japan',this)">🇯🇵 Japan</button>
            <button class="hm-opt" onclick="pickUniverse('AllGermany','🇩🇪 Germany',this)">🇩🇪 Germany</button>
            <button class="hm-opt" onclick="pickUniverse('AllIndia','🇮🇳 India',this)">🇮🇳 India</button>
            <button class="hm-opt" onclick="pickUniverse('AllUK','🇬🇧 United Kingdom',this)">🇬🇧 United Kingdom</button>
            <button class="hm-opt" onclick="pickUniverse('AllFrance','🇫🇷 France',this)">🇫🇷 France</button>
            <button class="hm-opt" onclick="pickUniverse('AllCanada','🇨🇦 Canada',this)">🇨🇦 Canada</button>
            <button class="hm-opt" onclick="pickUniverse('AllSwitzerland','🇨🇭 Switzerland',this)">🇨🇭 Switzerland</button>
            <button class="hm-opt" onclick="pickUniverse('AllTaiwan','🇹🇼 Taiwan',this)">🇹🇼 Taiwan</button>
            <button class="hm-opt" onclick="pickUniverse('AllSouthKorea','🇰🇷 South Korea',this)">🇰🇷 South Korea</button>
            <button class="hm-opt" onclick="pickUniverse('AllAustralia','🇦🇺 Australia',this)">🇦🇺 Australia</button>
            <button class="hm-opt" onclick="pickUniverse('AllBrazil','🇧🇷 Brazil',this)">🇧🇷 Brazil</button>
            <button class="hm-opt" onclick="pickUniverse('AllIndonesia','🇮🇩 Indonesia',this)">🇮🇩 Indonesia</button>
            <div class="hm-sec">Sectors</div>
            <button class="hm-opt" onclick="pickUniverse('SectorFinancials','💰 Financials',this)">💰 Financials</button>
            <button class="hm-opt" onclick="pickUniverse('SectorTech','💻 Technology',this)">💻 Technology</button>
            <button class="hm-opt" onclick="pickUniverse('SectorHealthcare','🏥 Healthcare',this)">🏥 Healthcare</button>
            <button class="hm-opt" onclick="pickUniverse('SectorConsumer','🛒 Consumer',this)">🛒 Consumer</button>
            <button class="hm-opt" onclick="pickUniverse('SectorIndustrials','⚙️ Industrials',this)">⚙️ Industrials</button>
            <button class="hm-opt" onclick="pickUniverse('SectorEnergy','⛽ Energy',this)">⛽ Energy</button>
            <button class="hm-opt" onclick="pickUniverse('SectorMaterials','⛏️ Materials',this)">⛏️ Materials</button>
            <button class="hm-opt" onclick="pickUniverse('SectorRealEstate','🏠 Real Estate',this)">🏠 Real Estate</button>
            <button class="hm-opt" onclick="pickUniverse('SectorUtilities','⚡ Utilities',this)">⚡ Utilities</button>
            <div class="hm-sec">Industry</div>
            <button class="hm-opt" onclick="pickUniverse('IndustrySemiconductors','💾 Semiconductors',this)">💾 Semiconductors</button>
            <button class="hm-opt" onclick="pickUniverse('IndustryBanks','🏦 Banks',this)">🏦 Banks</button>
            <button class="hm-opt" onclick="pickUniverse('IndustrySoftware','💻 Software',this)">💻 Software</button>
            <button class="hm-opt" onclick="pickUniverse('IndustryRetail','🛍️ Retail',this)">🛍️ Retail</button>
            <button class="hm-opt" onclick="pickUniverse('IndustryAutoComponents','🚗 Automobiles',this)">🚗 Automobiles</button>
            <button class="hm-opt" onclick="pickUniverse('IndustryTelecom','📱 Telecom',this)">📱 Telecom</button>
            <div class="hm-sec">ETF</div>
            <button class="hm-opt" onclick="pickUniverse('ETFsUS','🧭 US ETFs',this)">🧭 US ETFs</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:0.4rem;">
          <span style="width:7px;height:7px;background:var(--success);border-radius:50%;display:inline-block;box-shadow:0 0 6px var(--success);"></span>
          <span style="font-size:0.78rem;color:var(--text-secondary);">Live</span>
        </div>
      </div>

      <!-- View toggle -->
      <div class="hm-view-toggle">
        <button class="hm-tab active" id="view-sector" onclick="setGrouping('sector',this)">Sector</button>
        <button class="hm-tab" id="view-industry" onclick="setGrouping('industry',this)">Industry</button>
        <button class="hm-tab" id="view-equal" onclick="toggleMonoSize(true,this)">Equal Size</button>
      </div>
    </div>
  </div>

  <!-- Metric Row -->
  <div class="hm-panel" style="padding:0.6rem 1rem;">
    <div class="hm-metric-row">
      <span class="hm-label">Metric</span>
      <div style="display:flex;gap:0.3rem;flex-wrap:wrap;" id="metric-pills">
        <button class="hm-pill" onclick="setMetric('change',this)">Daily</button>
        <button class="hm-pill" onclick="setMetric('Perf.W',this)">1W</button>
        <button class="hm-pill" onclick="setMetric('Perf.1M',this)">1M</button>
        <button class="hm-pill active" onclick="setMetric('Perf.YTD',this)">YTD</button>
        <button class="hm-pill" onclick="setMetric('Perf.Y',this)">1Y</button>
        <button class="hm-pill" onclick="setMetric('Perf.5Y',this)">5Y</button>
        <span style="width:1px;height:22px;background:rgba(138,203,208,0.15);margin:0 0.25rem;"></span>
        <button class="hm-pill" onclick="setMetric('price_earnings_ttm',this)">P/E</button>
        <button class="hm-pill" onclick="setMetric('price_earnings_growth_ttm',this)">PEG</button>
        <button class="hm-pill" onclick="setMetric('dividend_yield_recent',this)">Div Yield</button>
        <button class="hm-pill" onclick="setMetric('price_free_cash_flow_ttm',this)">FCF Yield</button>
        <button class="hm-pill" onclick="setMetric('revenue_growth_yoy',this)">Rev Growth</button>
      </div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="hm-panel hm-map-wrap" style="padding:0;overflow:hidden;">
    <div style="padding:0.75rem 1.25rem;border-bottom:1px solid rgba(138,203,208,0.1);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:1rem;font-weight:800;color:var(--brand-light);" id="map-title">🇺🇸 S&P 500 · YTD Return</span>
      <span style="font-size:0.72rem;color:var(--text-secondary);">Click any block to analyze</span>
    </div>
    <div style="height:72vh;min-height:480px;max-height:70vh;" id="heatmap-container">
      <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
        {"exchanges":[],"dataSource":"SPX500","grouping":"sector","blockSize":"market_cap_basic","blockColor":"Perf.YTD","locale":"en","symbolUrl":"","colorTheme":"dark","hasTopBar":true,"isDataSetEnabled":true,"isZoomEnabled":true,"hasSymbolTooltip":true,"isMonoSize":false,"width":"100%","height":"100%"}
        </script>
      </div>
    </div>
    <!-- Legend -->
    <div style="padding:0.6rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <div style="display:flex;flex-direction:column;gap:2px;">
            <div class="hm-legend-bar" style="background:linear-gradient(to right, #dc2626, #b91c1c, #991b1b, #7f1d1d);width:40px;height:10px;border-radius:3px;"></div>
            <div style="font-size:0.6rem;color:#ef4444;font-weight:700;text-align:right;" id="legend-neg">-50%</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;">
            <div class="hm-legend-bar" style="background:linear-gradient(to right, #991b1b, #4a1a6b, #1a1a4e, #0d0645, #064e3b);width:120px;height:10px;border-radius:3px;"></div>
            <div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text-secondary);">
              <span id="legend-neg-mid">-20%</span><span>0</span><span id="legend-pos-mid">+20%</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:2px;">
            <div class="hm-legend-bar" style="background:linear-gradient(to right, #065f46, #047857, #10b981, #34d399);width:40px;height:10px;border-radius:3px;"></div>
            <div style="font-size:0.6rem;color:#10b981;font-weight:700;" id="legend-pos">+50%</div>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;font-size:0.72rem;color:var(--text-secondary);">
        <span>Block size = Market Cap</span>
        <span>Click block to analyze</span>
      </div>
    </div>
  </div>

</div>

<script>
var currentSource='SPX500', currentMetric='Perf.YTD', currentGrouping='sector', monoSize=false;

var metricLabels={
  'change':'Daily Change','Perf.W':'1 Week','Perf.1M':'1 Month','Perf.YTD':'YTD Return','Perf.Y':'1 Year','Perf.5Y':'5 Year',
  'price_earnings_ttm':'P/E','price_earnings_growth_ttm':'PEG','dividend_yield_recent':'Div Yield',
  'price_free_cash_flow_ttm':'FCF Yield','revenue_growth_yoy':'Rev Growth'
};

var sourceLabels={
  'SPX500':'S&P 500','NASDAQ100':'Nasdaq 100','DowJones':'Dow Jones 30','Russell2000':'Russell 2000','Russell1000':'Russell 1000',
  'AllUSA':'All US Stocks','ETFsUS':'US ETFs',
  'AllChina':'China','AllJapan':'Japan','AllGermany':'Germany','AllIndia':'India','AllUK':'United Kingdom',
  'AllFrance':'France','AllCanada':'Canada','AllSwitzerland':'Switzerland','AllTaiwan':'Taiwan',
  'AllSouthKorea':'South Korea','AllAustralia':'Australia','AllBrazil':'Brazil','AllIndonesia':'Indonesia',
  'SectorFinancials':'Financials','SectorTech':'Technology','SectorHealthcare':'Healthcare','SectorConsumer':'Consumer',
  'SectorIndustrials':'Industrials','SectorEnergy':'Energy','SectorMaterials':'Materials','SectorRealEstate':'Real Estate','SectorUtilities':'Utilities',
  'IndustrySemiconductors':'Semiconductors','IndustryBanks':'Banks','IndustrySoftware':'Software',
  'IndustryRetail':'Retail','IndustryAutoComponents':'Automobiles','IndustryTelecom':'Telecom'
};

function toggleUniverseDD(){
  var dd=document.getElementById('universe-dd');
  dd.classList.toggle('open');
}
document.addEventListener('click',function(e){
  var w=document.getElementById('universe-dd-wrap');
  if(w&&!w.contains(e.target)){document.getElementById('universe-dd').classList.remove('open');}
});

function pickUniverse(src,label,el){
  currentSource=src;
  document.getElementById('universe-label').textContent=label;
  document.querySelectorAll('.hm-opt').forEach(function(o){o.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('universe-dd').classList.remove('open');
  updateMap();
}

function setMetric(m,el){
  currentMetric=m;
  document.querySelectorAll('#metric-pills .hm-pill').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  updateLegend();
  updateMap();
}

function setGrouping(g,el){
  currentGrouping=g;
  document.querySelectorAll('.hm-view-toggle .hm-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  monoSize=false;
  updateMap();
}

function toggleMonoSize(v,el){
  monoSize=v;
  document.querySelectorAll('.hm-view-toggle .hm-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  updateMap();
}

function updateLegend(){
  var m=currentMetric;
  var pctMetrics=['change','Perf.W','Perf.1M','Perf.3M','Perf.6M','Perf.YTD','Perf.Y','Perf.5Y'];
  if(pctMetrics.indexOf(m)>=0){
    document.getElementById('legend-neg').textContent='-50%';
    document.getElementById('legend-neg-mid').textContent='-20%';
    document.getElementById('legend-pos-mid').textContent='+20%';
    document.getElementById('legend-pos').textContent='+50%';
  } else {
    document.getElementById('legend-neg').textContent='Low';
    document.getElementById('legend-neg-mid').textContent='';
    document.getElementById('legend-pos-mid').textContent='Mid';
    document.getElementById('legend-pos').textContent='High';
  }
}

function updateMap(){
  var srcLabel=sourceLabels[currentSource]||currentSource;
  var metLabel=metricLabels[currentMetric]||currentMetric;
  document.getElementById('map-title').textContent=srcLabel+' · '+metLabel;

  var c=document.getElementById('heatmap-container');
  c.innerHTML='<div class="tradingview-widget-container" style="height:100%;width:100%"><div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div></div>';
  var s=document.createElement('script');
  s.type='text/javascript';
  s.src='https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js';
  s.async=true;
  s.textContent=JSON.stringify({
    "exchanges":[],"dataSource":currentSource,"grouping":currentGrouping,
    "blockSize":"market_cap_basic","blockColor":currentMetric,
    "locale":"en","symbolUrl":"","colorTheme":"dark",
    "hasTopBar":true,"isDataSetEnabled":true,"isZoomEnabled":true,
    "hasSymbolTooltip":true,"isMonoSize":monoSize,
    "width":"100%","height":"100%"
  });
  c.querySelector('.tradingview-widget-container').appendChild(s);
}
</script>
{% endblock %}
